<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Important Study Material</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
        /* Academic/PDF look initially */
        background: #f0f2f5;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        transition: background 0.5s ease;
    }

    /* Watermark / Credit Style */
    .guddu-credit {
        font-size: 13px;
        color: #777;
        font-weight: 600;
        margin-top: 20px;
        letter-spacing: 0.5px;
    }

    /* Step 1: Study Material Screen */
    #intro-card {
        background: #ffffff;
        padding: 40px 25px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        text-align: center;
        width: 85%;
        max-width: 420px;
        z-index: 10;
        border-top: 5px solid #ff4757;
    }

    .subject-title {
        color: #2f3542;
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 10px;
        line-height: 1.3;
    }

    .vvi-text {
        color: #ff4757;
        font-size: 16px;
        font-weight: bold;
        background: #ffeaa7;
        display: inline-block;
        padding: 5px 10px;
        border-radius: 5px;
        margin-bottom: 25px;
    }

    .action-btn {
        background: #ff4757;
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 18px;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
        width: 100%;
        box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
    }

    .action-btn:hover {
        background: #ff6b81;
        transform: translateY(-2px);
    }

    /* Step 2: Loading Animation */
    #loading {
        display: none;
        flex-direction: column;
        align-items: center;
        color: #2f3542;
        font-weight: 600;
        font-size: 17px;
    }

    .spinner {
        width: 45px;
        height: 45px;
        border: 4px solid #dfe4ea;
        border-top: 4px solid #ff4757;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 15px;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    /* Step 3: Final Prank Card */
    #prank-card {
        display: none;
        background: white;
        border-radius: 25px;
        padding: 40px 20px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        width: 90%;
        max-width: 420px;
        text-align: center;
        border: 5px solid #FFD700;
        animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    }

    @keyframes popIn {
        0% { transform: scale(0.5); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }

    h1 {
        font-family: 'Fredoka One', cursive;
        font-size: 45px;
        margin: 10px 0;
        background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .emoji-box {
        font-size: 55px;
        margin: 15px 0;
        animation: bounce 1s infinite alternate;
    }

    @keyframes bounce {
        from { transform: translateY(0); }
        to { transform: translateY(-15px); }
    }

    .prank-msg {
        background: #f8f9fa;
        padding: 15px;
        border-radius: 12px;
        font-weight: bold;
        color: #333;
        border-left: 5px solid #f5576c;
        font-size: 16px;
    }

</style>
</head>

<body>

    <div id="intro-card">
        <div style="font-size: 40px; margin-bottom: 10px;">📄</div>
        <div class="subject-title">Physics Mechanics Fundamental</div>
        <div class="vvi-text">Most VVI Objective & Subjective Question</div>
        
        <button class="action-btn" onclick="triggerPrank()">Open Document</button>
        
        <div class="guddu-credit">✨ Made by Guddu Gamerz ✨</div>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <div>Opening PDF File...</div>
        
        <div class="guddu-credit" style="margin-top: 30px;">✨ Made by Guddu Gamerz ✨</div>
    </div>

    <div id="prank-card">
        <div style="font-size: 50px;">🤡</div>
        <h1>APRIL FOOL!</h1>
        <div class="emoji-box">😂😂😂</div>
        <div class="prank-msg">
            Gotcha! <br> 
            Did you really think you will get the VVI questions here? Go study! 📚
        </div>
        
        <div class="guddu-credit" style="color: #f5576c;">🎮 Made by Guddu Gamerz 🎮</div>
    </div>

    <audio id="sound" src="https://www.myinstants.com/media/sounds/trollolol.mp3" preload="auto"></audio>

<script>
    function triggerPrank() {
        let audio = document.getElementById("sound");
        
        // Trick to bypass browser audio block
        audio.muted = true;
        audio.play().catch(e => console.log("Audio waiting..."));

        // Hide Intro, Show Loading
        document.getElementById("intro-card").style.display = "none";
        document.getElementById("loading").style.display = "flex";

        // Wait for 2.5 seconds to build the suspense
        setTimeout(() => {
            // Hide loading, show prank card
            document.getElementById("loading").style.display = "none";
            document.getElementById("prank-card").style.display = "block";
            
            // Change background to something funny/bright
            document.body.style.background = "linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)";
            
            // Unmute and play sound loud
            audio.muted = false;
            audio.currentTime = 0; 
            audio.volume = 1.0;
            audio.play();
        }, 2500); // 2.5 seconds delay
    }
</script>

</body>
</html>
